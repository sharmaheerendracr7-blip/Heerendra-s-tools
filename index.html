<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Online Tools - Heerendra Tools</title>
<meta name="description" content="Free tools like PDF converter, password generator, calculator and more">

<style>
body { font-family: Arial; margin:0; background:#0f0f0f; color:white; text-align:center; }
h1 { padding:20px; }

.container { display:flex; flex-wrap:wrap; justify-content:center; }

.card {
  background:#1c1c1c;
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:280px;
}

input { padding:8px; margin-top:8px; border-radius:6px; border:none; width:90%; }

button {
  padding:8px 12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#00ffcc;
  cursor:pointer;
}

footer { margin-top:40px; padding:20px; background:#000; }
footer a { color:#00ffcc; margin:0 10px; text-decoration:none; }

@media(max-width:600px){ .card{width:90%;} }
</style>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>🔥 Heerendra Tools</h1>

<div class="container">

<div class="card">
<h3>Password Generator</h3>
<button onclick="p()">Generate</button>
<p id="p"></p>
</div>

<div class="card">
<h3>Word Counter</h3>
<input id="w">
<button onclick="wc()">Count</button>
<p id="wc"></p>
</div>

<div class="card">
<h3>Calculator</h3>
<input id="calc" placeholder="2+2">
<button onclick="cal()">Solve</button>
<p id="cal"></p>
</div>

<div class="card">
<h3>Image to PDF</h3>
<input type="file" id="imgInput">
<button onclick="imgToPDF()">Convert</button>
</div>

<div class="card">
<h3>Create PDF (Text)</h3>
<input id="pdfText" placeholder="Enter text">
<button onclick="makePDF()">Create</button>
</div>

<div class="card">
<h3>Random Number</h3>
<button onclick="rn()">Generate</button>
<p id="rn"></p>
</div>

</div>

<footer>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
</footer>

<script>
function p(){
 let c="abc123XYZ@#";
 let pass="";
 for(let i=0;i<8;i++){ pass+=c[Math.floor(Math.random()*c.length)] }
 document.getElementById("p").innerText=pass;
}

function wc(){
 let t=w.value.trim();
 document.getElementById("wc").innerText=t? t.split(/\s+/).length:0;
}

function cal(){
 try{
  document.getElementById("cal").innerText=eval(calc.value)
 }catch{
  document.getElementById("cal").innerText="Error"
 }
}

function rn(){
 document.getElementById("rn").innerText=Math.floor(Math.random()*1000)
}

function imgToPDF(){
 const { jsPDF } = window.jspdf;
 let file=document.getElementById("imgInput").files[0];
 if(!file) return alert("Select image first");

 let reader=new FileReader();
 reader.onload=function(e){
  let pdf=new jsPDF();
  pdf.addImage(e.target.result,'JPEG',10,10,180,160);
  pdf.save("converted.pdf");
 }
 reader.readAsDataURL(file);
}

function makePDF(){
 const { jsPDF } = window.jspdf;
 let pdf=new jsPDF();
 let text=document.getElementById("pdfText").value;
 pdf.text(text,10,10);
 pdf.save("file.pdf");
}
</script>

</body>
</html>
