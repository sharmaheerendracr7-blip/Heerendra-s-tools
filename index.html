<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool Verse 🚀</title>

<meta name="google-adsense-account" content="ca-pub-4632067561827198">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4632067561827198"
crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}
header{text-align:center;padding:20px;background:black;font-size:24px}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
transition:0.3s;
}
.card:hover{transform:scale(1.05);box-shadow:0 0 15px #00ffcc}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffcc;
cursor:pointer;
margin-top:10px;
}

input{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px}
</style>
</head>

<body>

<header>🚀 Tool Verse</header>

<div class="container">

<!-- IMAGE TO PDF -->
<div class="card">
<h3>📄 Image to PDF</h3>
<input type="file" id="imgInput" accept="image/*">
<button onclick="convertPDF()">Convert & Download</button>
</div>

<!-- IMAGE COMPRESS -->
<div class="card">
<h3>🖼️ Image Compressor</h3>
<input type="file" id="imgCompress" accept="image/*">
<button onclick="compressImg()">Compress & Download</button>
</div>

<!-- JPG TO PNG -->
<div class="card">
<h3>🔄 JPG → PNG</h3>
<input type="file" id="imgConvert" accept="image/*">
<button onclick="convertImg()">Convert</button>
</div>

<!-- PASSWORD -->
<div class="card">
<h3>🔐 Password Generator</h3>
<button onclick="genPass()">Generate</button>
<p id="pass"></p>
</div>

</div>

<script>

/* IMAGE TO PDF (FIXED) */
function convertPDF(){
let file = document.getElementById("imgInput").files[0];
if(!file){ alert("Select image"); return; }

const { jsPDF } = window.jspdf;
let reader = new FileReader();

reader.onload = function(e){
let img = new Image();
img.src = e.target.result;

img.onload = function(){

let pdf = new jsPDF({
orientation: img.width > img.height ? "landscape" : "portrait",
unit: "px",
format: [img.width, img.height]
});

pdf.addImage(img, 'JPEG', 0, 0, img.width, img.height);
pdf.save("ToolVerse.pdf");
}
}

reader.readAsDataURL(file);
}

/* IMAGE COMPRESS (FIXED) */
function compressImg(){
let file = document.getElementById("imgCompress").files[0];
if(!file){ alert("Select image"); return; }

let reader = new FileReader();

reader.onload = function(e){
let img = new Image();
img.src = e.target.result;

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

/* Resize to 70% */
canvas.width = img.width * 0.7;
canvas.height = img.height * 0.7;

ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

let link = document.createElement("a");
link.download = "compressed.jpg";
link.href = canvas.toDataURL("image/jpeg", 0.6);
link.click();
}
}

reader.readAsDataURL(file);
}

/* JPG TO PNG (REAL FIX) */
function convertImg(){
let file = document.getElementById("imgConvert").files[0];
if(!file){ alert("Select image"); return; }

let reader = new FileReader();

reader.onload = function(e){
let img = new Image();
img.src = e.target.result;

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img, 0, 0);

let link = document.createElement("a");
link.download = "converted.png";
link.href = canvas.toDataURL("image/png");
link.click();
}
}

reader.readAsDataURL(file);
}

/* PASSWORD */
function genPass(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ123456789";
let pass="";
for(let i=0;i<10;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("pass").innerText=pass;
}

</script>

</body>
</html>
