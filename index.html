<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool Verse 🚀 | Free Online Tools</title>

<meta name="google-adsense-account" content="ca-pub-4632067561827198">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4632067561827198"
crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0a0a0a,#111);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:25px;
font-size:28px;
background:black;
animation:fadeIn 1s ease;
}

.sub{
text-align:center;
color:gray;
margin-bottom:20px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#111;
padding:20px;
border-radius:15px;
transition:0.3s;
animation:fadeUp 1s ease;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00ffcc;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00ffcc,#00bfa6);
cursor:pointer;
margin-top:10px;
}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:black;
margin-top:20px;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}
</style>
</head>

<body>

<header>🚀 Tool Verse</header>
<p class="sub">All-in-One Free Online Tools 💸</p>

<div class="container">

<!-- IMAGE TO PDF -->
<div class="card">
<h3>📄 Image to PDF</h3>
<input type="file" id="imgInput" accept="image/*">
<button onclick="imgToPDF()">Convert & Download</button>
</div>

<!-- TEXT TO PDF -->
<div class="card">
<h3>📝 Text to PDF</h3>
<textarea id="textData" placeholder="Enter text..."></textarea>
<button onclick="textToPDF()">Download PDF</button>
</div>

<!-- PDF MERGE -->
<div class="card">
<h3>📑 PDF Merge</h3>
<input type="file" id="pdfFiles" multiple>
<button onclick="mergePDF()">Merge PDFs</button>
<p style="color:gray">Note: Basic merge (images supported)</p>
</div>

<!-- IMAGE COMPRESS -->
<div class="card">
<h3>🖼️ Image Compressor</h3>
<input type="file" id="imgCompress" accept="image/*">
<button onclick="compressImg()">Compress</button>
</div>

</div>

<footer>
<a href="about.html">About</a> |
<a href="privacy.html">Privacy</a> |
<a href="terms.html">Terms</a> |
<a href="disclaimer.html">Disclaimer</a>
</footer>

<script>

/* IMAGE → PDF */
function imgToPDF(){
let file=document.getElementById("imgInput").files[0];
if(!file){alert("Select image");return;}

const { jsPDF } = window.jspdf;
let reader=new FileReader();

reader.onload=function(e){
let img=new Image();
img.src=e.target.result;

img.onload=function(){
let pdf=new jsPDF();
pdf.addImage(img,'JPEG',10,10,180,160);
pdf.save("image.pdf");
}
}
reader.readAsDataURL(file);
}

/* TEXT → PDF */
function textToPDF(){
let text=document.getElementById("textData").value;
if(!text){alert("Enter text");return;}

const { jsPDF } = window.jspdf;
let pdf=new jsPDF();
pdf.text(text,10,10);
pdf.save("text.pdf");
}

/* PDF MERGE (simple) */
function mergePDF(){
alert("Basic version only works with images converted to PDF.\nAdvanced merge needs backend.");
}

/* COMPRESS */
function compressImg(){
let file=document.getElementById("imgCompress").files[0];
let reader=new FileReader();

reader.onload=function(e){
let img=new Image();
img.src=e.target.result;

img.onload=function(){
let canvas=document.createElement("canvas");
canvas.width=img.width*0.7;
canvas.height=img.height*0.7;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,canvas.width,canvas.height);

let link=document.createElement("a");
link.download="compressed.jpg";
link.href=canvas.toDataURL("image/jpeg",0.6);
link.click();
}
}
reader.readAsDataURL(file);
}

</script>

</body>
</html>
