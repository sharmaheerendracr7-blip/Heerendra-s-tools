<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool Verse 🚀</title>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4632067561827198"
crossorigin="anonymous"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

#loader h1{
font-size:40px;
color:#00ffcc;
animation: glow 1.5s infinite alternate;
}

@keyframes glow{
from{opacity:0.5;}
to{opacity:1;}
}

/* MAIN */
#main{
display:none;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px;
background:black;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.hero h1{
font-size:35px;
color:#00ffcc;
}

/* TOOLS */
.container{
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:20px;
margin:15px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ffcc;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#00ffcc;
cursor:pointer;
}

input{
padding:8px;
width:80%;
margin-top:10px;
}

/* CHAT BUTTON */
#chatToggle{
position:fixed;
bottom:20px;
right:20px;
background:#00ffcc;
color:black;
font-size:22px;
padding:15px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 15px #00ffcc;
z-index:9999;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

/* CHATBOX */
#chatbot{
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:#111;
border-radius:10px;
display:none;
overflow:hidden;
box-shadow:0 0 15px #00ffcc;
}

.chat-header{
background:#00ffcc;
color:black;
padding:10px;
text-align:center;
}

#chatbox{
height:200px;
overflow-y:auto;
padding:10px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
border:none;
}

.chat-input button{
background:#00ffcc;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:black;
margin-top:30px;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
<h1>🚀 Tool Verse</h1>
<p>Loading tools...</p>
</div>

<!-- MAIN WEBSITE -->
<div id="main">

<nav>
<h2>🚀 Tool Verse</h2>
<div>
<a href="#">Home</a>
<a href="#tools">Tools</a>
</div>
</nav>

<div class="hero">
<h1>All-in-One Free Tools 😎</h1>
<p>PDF, Image, AI & More Tools in One Place</p>
</div>

<div class="container" id="tools">

<div class="card">
<h3>🔐 Password Generator</h3>
<button onclick="genPass()">Generate</button>
<p id="pass"></p>
</div>

<div class="card">
<h3>🧮 Calculator</h3>
<input id="num1" placeholder="Number 1">
<input id="num2" placeholder="Number 2">
<button onclick="calc()">Add</button>
<p id="result"></p>
</div>

<div class="card">
<h3>📄 PDF Editor</h3>
<button onclick="window.open('https://www.ilovepdf.com/edit-pdf')">Open</button>
</div>

<div class="card">
<h3>🖼️ JPG to PNG</h3>
<button onclick="window.open('https://image.online-convert.com/convert/jpg-to-png')">Convert</button>
</div>

</div>

<footer>
<p>Email: sharmaheerendracr7@gmail.com</p>
<p>© 2026 Tool Verse</p>
</footer>

</div>

<!-- CHAT BUTTON -->
<div id="chatToggle" onclick="toggleChat()">🤖</div>

<!-- CHATBOX -->
<div id="chatbot">
<div class="chat-header">AI Assistant</div>
<div id="chatbox"></div>

<div class="chat-input">
<input id="userInput" placeholder="Type...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>
/* LOADER */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("main").style.display="block";
},2000);

/* TOOLS */
function genPass(){
let c="ABCDEFGHIJKLMNOPQRSTUVWXYZ123456";
let p="";
for(let i=0;i<8;i++){
p+=c[Math.floor(Math.random()*c.length)];
}
pass.innerText=p;
}

function calc(){
result.innerText=Number(num1.value)+Number(num2.value);
}

/* CHAT */
function toggleChat(){
let chat=document.getElementById("chatbot");
chat.style.display=(chat.style.display==="block")?"none":"block";
}

function sendMsg(){
let input=userInput.value;
let chat=document.getElementById("chatbox");

chat.innerHTML+="<p>👤: "+input+"</p>";

let reply="I don't understand 🤔";
if(input.includes("hi")) reply="Hello 👋";
if(input.includes("tools")) reply="Use tools above 😎";

chat.innerHTML+="<p>🤖: "+reply+"</p>";

userInput.value="";
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
